# ===========================================
# Scribbly - Docker Compose
# Local development environment
# ===========================================
# Usage: docker-compose up -d

services:
  # ---------------------
  # PostgreSQL Database
  # ---------------------
  postgres:
    image: postgres:16-alpine
    container_name: scribbly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: scribbly
      POSTGRES_USER: artuser
      POSTGRES_PASSWORD: artpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artuser -d scribbly"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------
  # Redis (Cache + Queue)
  # ---------------------
  redis:
    image: redis:7-alpine
    container_name: scribbly-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------
  # MinIO (S3-compatible storage)
  # ---------------------
  minio:
    image: minio/minio:latest
    container_name: scribbly-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # ---------------------
  # Backend API (CPU)
  # ---------------------
  backend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend-cpu
    container_name: scribbly-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://artuser:artpass@postgres:5432/scribbly
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # ---------------------
  # Web Frontend (dev mode)
  # ---------------------
  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web-dev
    container_name: scribbly-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./web/.env
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    depends_on:
      - backend
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules

  # ---------------------
  # Celery Worker (CPU)
  # ---------------------
  celery-worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.celery
    container_name: scribbly-celery
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://artuser:artpass@postgres:5432/scribbly
      S3_ENDPOINT: http://minio:9000
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./ai-engine:/app/ai-engine

# ---------------------
# Volumes
# ---------------------
volumes:
  postgres_data:
  redis_data:
  minio_data:
  web_node_modules:

# ---------------------
# Networks
# ---------------------
networks:
  default:
    name: scribbly-network
