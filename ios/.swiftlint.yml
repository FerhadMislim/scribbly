# Scribbly SwiftLint Configuration
# https://github.com/realm/SwiftLint

disabled_rules:
  - trailing_whitespace

opt_in_rules:
  - empty_count
  - missing_docs
  - closure_spacing
  - explicit_init
  - first_where
  - sorted_imports
  - redundant_nil_coalescing
  - contains_over_first_not_nil
  - redundant_self

excluded:
  - .build
  - Packages
  - DerivedData
  - *.xcodeproj
  - Pods

line_length:
  warning: 120
  error: 200
  ignores_function_declarations: true
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 50
  error: 100

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 50
    error: 60

type_name:
  min_length: 3
  max_length: 50

reporter: "xcode"

# Custom rules for Scribbly
custom_rules:
  no_print_in_production:
    name: "Print in production"
    regex: "print\\("
    message: "Remove print statement or use logging framework"
    severity: warning
    match_kinds:
      - function
